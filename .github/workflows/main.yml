name: Build N VPN APK

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Unzip Final Project
        run: |
          unzip -o NVPN_Final.zip -d .
          ls -la

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create Keystore
        run: |
          keytool -genkeypair -alias nvpn -keyalg RSA -keysize 2048 -validity 10000 \
            -keystore nvpn.keystore -storepass 12345678 -keypass 12345678 \
            -dname "CN=N VPN, OU=Dev, O=N, L=Tehran, S=Tehran, C=IR"

      - name: Build & Sign APK
        run: |
          cd NVPN
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon
          
          $ANDROID_HOME/build-tools/34.0.0/apksigner sign \
            --ks ../nvpn.keystore \
            --ks-pass pass:12345678 \
            --out app/build/outputs/apk/release/NVPN-Signed.apk \
            app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Upload Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: NVPN-Signed-APK
          path: NVPN/app/build/outputs/apk/release/NVPN-Signed.apk
          retention-days: 30

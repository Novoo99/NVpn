name: Build N VPN APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Unzip source project
        run: |
          unzip -o NVPN_Fixed.zip -d project
          ls -la project/

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission
        run: chmod +x project/NVPN/gradlew

      - name: Build Release APK
        working-directory: project/NVPN
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NVPN-Release-APK
          path: project/NVPN/app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30
